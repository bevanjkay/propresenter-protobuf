name: Update ProPresenter Protobufs

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check ProPresenter version
        id: version
        run: |
          AVAILABLE=$(brew info --cask propresenter --json=v2 | jq -r '.casks[0].version')
          echo "available=$AVAILABLE" >> "$GITHUB_OUTPUT"

          STORED="none"
          if [ -f version.txt ]; then
            STORED=$(cat version.txt | tr -d '[:space:]')
          fi
          echo "stored=$STORED" >> "$GITHUB_OUTPUT"

          if [ "$AVAILABLE" = "$STORED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version $AVAILABLE is current, nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $STORED -> $AVAILABLE"
          fi

      - name: Install protodump
        if: steps.version.outputs.changed == 'true'
        run: brew install bevanjkay/formulae/protodump

      - name: Install ProPresenter
        if: steps.version.outputs.changed == 'true'
        run: brew install --cask propresenter

      - name: Generate protobufs
        if: steps.version.outputs.changed == 'true'
        run: |
          rm -rf proto
          mkdir -p proto
          find /Applications/ProPresenter.app -type f -perm +111 -print | while read -r f; do
            protodump -file "$f" -output proto 2>/dev/null || true
          done

      - name: Open PR
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.available }}
        run: |
          BRANCH="update/propresenter-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          EXISTING_PR=$(gh pr list --base main --head "${BRANCH}" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "${EXISTING_PR}" ]; then
            echo "PR #${EXISTING_PR} already open for ${VERSION}, skipping."
            exit 0
          fi

          git checkout -b "${BRANCH}"
          echo "${VERSION}" > version.txt
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update protobufs for ProPresenter ${VERSION}"
          git push --force origin "${BRANCH}"
          gh pr create \
            --title "Update protobufs for ProPresenter ${VERSION}" \
            --body "Automated update for ProPresenter ${VERSION}." \
            --base main \
            --head "${BRANCH}"
